name: Release

on:
  push:
    tags:
      - "*-v*"

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task scaffold   # regenerates scaffold-managed themes + registry.json only
      - run: deno task pack:all  # packs every catalog theme with a package on disk
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
