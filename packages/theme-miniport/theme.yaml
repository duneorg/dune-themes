name: miniport
version: 1.0.0
description: "Miniport — minimal portfolio theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-miniport
attribution: "HTML5 UP Miniport (CC BY 3.0) — https://html5up.net/miniport"
config_schema:
  hero_image:
    type: text
    label: Home portrait URL (empty = theme default)
    default: ""
  home_headline:
    type: text
    label: Home headline (empty = page or site title)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
