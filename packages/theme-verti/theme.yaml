name: verti
version: 1.0.0
description: "Verti — business landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-verti
attribution: "HTML5 UP Verti (CC BY 3.0) — https://html5up.net/verti"
config_schema:
  tagline:
    type: text
    label: Logo tagline under site title
    default: "by HTML5 UP"
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
