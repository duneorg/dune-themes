name: dimension
version: 1.0.0
description: "Dimension — modal panel landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-dimension
attribution: "HTML5 UP Dimension (CC BY 3.0) — https://html5up.net/dimension"
config_schema:
  header_title:
    type: text
    label: Landing headline (empty = site title)
    default: ""
  header_subtitle:
    type: text
    label: Landing subtitle (empty = site description)
    default: ""
  logo_icon:
    type: text
    label: Font Awesome icon class for logo (e.g. fa-gem)
    default: "fa-gem"
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
