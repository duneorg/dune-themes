name: ethereal
version: 1.0.0
description: "Ethereal — panel-based landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-ethereal
attribution: "HTML5 UP Ethereal (CC BY 3.0) — https://html5up.net/ethereal"
config_schema:
  tagline:
    type: text
    label: Banner tagline (empty = site description)
    default: ""
  banner_title:
    type: text
    label: Banner name (empty = site title)
    default: ""
  show_banner:
    type: toggle
    label: Show banner panel on home
    default: true
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
