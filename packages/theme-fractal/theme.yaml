name: fractal
version: 1.0.0
description: "Fractal — phone hero portfolio theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-fractal
attribution: "HTML5 UP Fractal (CC BY 3.0) — https://html5up.net/fractal"
config_schema:
  header_title:
    type: text
    label: Header title (empty = site title)
    default: ""
  header_subtitle:
    type: text
    label: Header subtitle (empty = site description)
    default: ""
  phone_image:
    type: text
    label: Phone mockup image URL (empty = theme default)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
