name: halcyonic
version: 1.0.0
description: "Halcyonic — business landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-halcyonic
attribution: "HTML5 UP Halcyonic (CC BY 3.0) — https://html5up.net/halcyonic"
config_schema:
  banner_text:
    type: text
    label: Banner copy (empty = site description)
    default: ""
  banner_image:
    type: text
    label: Banner image URL (empty = theme default)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
