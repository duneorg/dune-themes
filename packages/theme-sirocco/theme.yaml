name: sirocco
parent: dune-minimal
description: "Sirocco — a fast, clean, minimalist blog theme for Dune, inspired by Hugo PaperMod"
author: "Dune Theme Library (design inspired by PaperMod by Aditya Telange)"
version: "1.0.0"
config_schema:
  color_scheme:
    type: select
    label: "Color scheme"
    options: [blue, slate, green, purple, amber, rose]
    default: blue
    help: "Accent color for links, the active nav underline, and blockquote borders — each has a matched light/dark-mode pair."
  scheme_switcher:
    type: toggle
    label: "Let visitors switch the color scheme"
    default: false
    help: "Adds a dropdown next to the dark-mode toggle so visitors can preview the other color_scheme presets client-side (persists in their browser via localStorage, doesn't change your site's actual config). Off by default — most sites want one consistent brand color; useful for a theme showcase/demo site."
  default_dark:
    type: toggle
    label: "Default to dark mode"
    default: false
  show_reading_time:
    type: toggle
    label: "Show reading time on posts"
    default: true
  home_subtitle:
    type: text
    label: "Home page subtitle"
    default: ""
