name: fennec
description: "Fennec — a personal portfolio & blog theme with sidebar and bold hero, inspired by Astrofy"
author: "Dune Theme Library (design inspired by Astrofy by Manuel Ernesto Garcia)"
version: "0.1.0"
config_schema:
  primary_color:
    type: color
    label: "Primary colour"
    default: "#f97316"
  avatar_url:
    type: text
    label: "Sidebar avatar image URL"
    default: ""
  hero_greeting:
    type: text
    label: "Hero greeting"
    default: "Hey there 👋"
  default_dark:
    type: toggle
    label: "Default to dark mode"
    default: false
