name: lucid
version: 1.0.0
description: "Modern docs theme inspired by Hugo Hextra — Dune-native, not a port."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-lucid
attribution: "Design inspired by Hextra (MIT) — Dune-native theme, not a port"
config_schema:
  color_scheme:
    type: select
    label: Color scheme
    options: [blue, slate, green, purple, amber, rose, terracotta, teal]
    default: purple
    help: "Accent colour for links and the active sidebar item — each preset has a matched light/dark pair. Default purple matches Hextra's violet."
  scheme_switcher:
    type: toggle
    label: Let visitors switch the color scheme
    default: false
    help: "Adds a dropdown next to the dark-mode toggle so visitors can preview other color_scheme presets (persists in their browser). Off by default — useful for a theme showcase/demo."
  default_dark:
    type: toggle
    label: Default to dark mode
    default: false
  sidebar_label:
    type: text
    label: Sidebar section label
    default: "Documentation"
  edit_url:
    type: text
    label: 'Edit on GitHub base URL (e.g. https://github.com/org/repo/edit/main/content)'
    default: ""
  footer_text:
    type: text
    label: Footer text (leave empty for default)
    default: ""
