name: parallelism
version: 1.0.0
description: "Parallelism — horizontal masonry portfolio theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-parallelism
attribution: "HTML5 UP Parallelism (CC BY 3.0) — https://html5up.net/parallelism"
config_schema:
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
  home_subtitle:
    type: text
    label: Footer tagline (empty = site description)
    default: ""
