name: future-imperfect
version: 1.0.0
description: "Future Imperfect — magazine blog theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-future-imperfect
attribution: "HTML5 UP Future Imperfect (CC BY 3.0) — https://html5up.net/future-imperfect"
config_schema:
  author_name:
    type: text
    label: Post author name
    default: "Author"
  author_avatar:
    type: text
    label: Author avatar URL (empty = theme default)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
