name: telephasic
version: 1.0.0
description: "Telephasic — business landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-telephasic
attribution: "HTML5 UP Telephasic (CC BY 3.0) — https://html5up.net/telephasic"
config_schema:
  hero_title:
    type: text
    label: Hero headline (empty = site title + default tagline)
    default: ""
  hero_subtitle:
    type: text
    label: Hero subtitle (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
