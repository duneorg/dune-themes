name: lens
version: 1.0.0
description: "Lens — fullscreen thumbnail gallery theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-lens
attribution: "HTML5 UP Lens (CC BY 3.0) — https://html5up.net/lens"
config_schema:
  home_subtitle:
    type: text
    label: Header tagline (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
