name: herald
version: 1.0.0
description: "Publication-style blog inspired by Ghost Casper — Dune-native, not a port."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-herald
attribution: "Design inspired by Casper (MIT) — Dune-native theme, not a port"
config_schema:
  color_scheme:
    type: select
    label: Color scheme
    options: [blue, slate, green, purple, amber, rose, terracotta, teal]
    default: blue
    help: "Accent colour for links — each preset has a matched light/dark pair, with tinted page and code-block backgrounds. Default blue is Casper's sky accent."
  scheme_switcher:
    type: toggle
    label: Let visitors switch the color scheme
    default: false
    help: "Adds a dropdown next to the dark-mode toggle so visitors can preview other color_scheme presets (persists in their browser). Off by default — useful for a theme showcase/demo."
  default_dark:
    type: toggle
    label: Default to dark mode
    default: false
  hero_title:
    type: text
    label: Home hero headline (empty = site title)
    default: ""
  hero_subtitle:
    type: text
    label: Home hero subtitle
    default: "Thoughts, stories and ideas."
  hero_image:
    type: text
    label: Home hero background image URL
    default: ""
  default_author:
    type: text
    label: Default author name
    default: ""
  default_avatar:
    type: text
    label: Default author avatar URL
    default: ""
  footer_text:
    type: text
    label: Footer text (leave empty for default)
    default: ""
