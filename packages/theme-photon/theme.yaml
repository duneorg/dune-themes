name: photon
version: 1.0.0
description: "Photon — single-page portfolio theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-photon
attribution: "HTML5 UP Photon (CC BY 3.0) — https://html5up.net/photon"
config_schema:
  avatar:
    type: text
    label: Avatar image URL (empty = theme default)
    default: ""
  tagline:
    type: text
    label: Hero tagline (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
