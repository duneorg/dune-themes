name: strongly-typed
version: 1.0.0
description: "Strongly Typed — typography blog theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-strongly-typed
attribution: "HTML5 UP Strongly Typed (CC BY 3.0) — https://html5up.net/strongly-typed"
config_schema:
  header_tagline:
    type: text
    label: Header tagline (empty = site description)
    default: ""
  show_banner:
    type: toggle
    label: Show banner strip on home page
    default: true
  banner_text:
    type: text
    label: Home banner text
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
