name: read-only
version: 1.0.0
description: "Read Only — sidebar profile blog theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-read-only
attribution: "HTML5 UP Read Only (CC BY 3.0) — https://html5up.net/read-only"
config_schema:
  avatar_url:
    type: text
    label: Avatar image URL (empty = theme default)
    default: ""
  sidebar_tagline:
    type: text
    label: Sidebar tagline (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
