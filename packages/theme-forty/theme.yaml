name: forty
version: 1.0.0
description: "Forty — tile-based landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-forty
attribution: "HTML5 UP Forty (CC BY 3.0) — https://html5up.net/forty"
config_schema:
  tagline:
    type: text
    label: Logo subtitle (empty = by HTML5 UP)
    default: ""
  banner_title:
    type: text
    label: Banner headline (empty = Hi, my name is {site title})
    default: ""
  show_banner:
    type: toggle
    label: Show banner section on home
    default: true
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
