name: manual
version: 1.0.0
description: "Product documentation theme inspired by Just the Docs — Dune-native, not a port."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-manual
attribution: "Design inspired by Just the Docs (MIT) — Dune-native theme, not a port"
config_schema:
  color_scheme:
    type: select
    label: Color scheme
    options: [blue, slate, green, purple, amber, rose, terracotta, teal]
    default: purple
    help: "Accent colour for links and the active sidebar item — each preset has a matched light/dark pair. Default purple matches Just the Docs (#7253ed)."
  scheme_switcher:
    type: toggle
    label: Let visitors switch the color scheme
    default: false
    help: "Adds a dropdown next to the dark-mode toggle so visitors can preview other color_scheme presets (persists in their browser). Off by default — useful for a theme showcase/demo."
  default_dark:
    type: toggle
    label: Default to dark mode
    default: false
  site_tagline:
    type: text
    label: Sidebar tagline under site title
    default: "Product documentation"
  footer_text:
    type: text
    label: Footer text (leave empty for default)
    default: ""
