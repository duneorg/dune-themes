name: oasis
version: 1.0.0
description: "Landing and academic résumé theme inspired by Hugo Blox — Dune-native, not a port."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-oasis
attribution: "Design inspired by Hugo Blox (MIT) — Dune-native theme, not a port"
config_schema:
  color_scheme:
    type: select
    label: Color scheme
    options: [blue, slate, green, purple, amber, rose, terracotta, teal]
    default: teal
    help: "Accent colour for links and active nav — each preset has a matched light/dark pair. Default teal keeps an academic, non-purple look."
  scheme_switcher:
    type: toggle
    label: Let visitors switch the color scheme
    default: false
  avatar_url:
    type: text
    label: Avatar image URL (landing hero)
    default: ""
  role:
    type: text
    label: Role / job title (landing hero)
    default: ""
  organization:
    type: text
    label: Organisation (landing hero)
    default: ""
  default_dark:
    type: toggle
    label: Default to dark mode
    default: false
  footer_text:
    type: text
    label: Footer text (leave empty for default)
    default: ""
