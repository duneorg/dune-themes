name: helios
version: 1.0.0
description: "Helios — carousel landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-helios
attribution: "HTML5 UP Helios (CC BY 3.0) — https://html5up.net/helios"
config_schema:
  tagline:
    type: text
    label: Header tagline (empty = site description)
    default: ""
  banner_title:
    type: text
    label: Banner headline (empty = Hi. You're looking at {site title}.)
    default: ""
  show_banner:
    type: toggle
    label: Show banner section on home
    default: true
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
