name: dopetrope
version: 1.0.0
description: "Dopetrope — magazine blog theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-dopetrope
attribution: "HTML5 UP Dopetrope (CC BY 3.0) — https://html5up.net/dopetrope"
config_schema:
  show_banner:
    type: toggle
    label: Show hero banner on home page
    default: true
  banner_title:
    type: text
    label: Banner headline (empty = site title)
    default: ""
  banner_subtitle:
    type: text
    label: Banner subtitle
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
