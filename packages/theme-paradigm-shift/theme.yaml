name: paradigm-shift
version: 1.0.0
description: "Paradigm Shift — responsive scroll landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-paradigm-shift
attribution: "HTML5 UP Paradigm Shift (CC BY 3.0) — https://html5up.net/paradigm-shift"
config_schema:
  tagline:
    type: text
    label: Intro tagline (empty = default)
    default: ""
  banner_title:
    type: text
    label: Intro headline (empty = site title)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
