name: salon
version: 1.0.0
description: "Magazine-style blog inspired by Ghost Liebling — Dune-native, not a port."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-salon
attribution: "Design inspired by Liebling (MIT) — Dune-native theme, not a port"
config_schema:
  color_scheme:
    type: select
    label: Color scheme
    options: [blue, slate, green, purple, amber, rose, terracotta, teal]
    default: rose
    help: "Accent colour for tags and links — each preset has a matched light/dark pair, with tinted page and code-block backgrounds."
  scheme_switcher:
    type: toggle
    label: Let visitors switch the color scheme
    default: false
    help: "Adds a dropdown next to the dark-mode toggle so visitors can preview other color_scheme presets (persists in their browser). Off by default — useful for a theme showcase/demo."
  default_dark:
    type: toggle
    label: Default to dark mode
    default: false
  home_subtitle:
    type: text
    label: Magazine tagline
    default: "Stories worth reading"
  footer_text:
    type: text
    label: Footer text (leave empty for default)
    default: ""
