name: caravan
description: "Caravan — a clean documentation theme with book-style sidebar, inspired by hugo-book"
author: "Dune Theme Library (design inspired by hugo-book by Alex Shpak)"
version: "1.1.2"
config_schema:
  color_scheme:
    type: select
    label: "Color scheme"
    options: [blue, slate, green, purple, amber, rose, terracotta, teal]
    default: blue
    help: "Accent color for links and the active sidebar item; each has a matched light/dark-mode pair (see utils/color-schemes.ts)"
  scheme_switcher:
    type: toggle
    label: "Let visitors switch the color scheme"
    default: false
    help: "Adds a sidebar dropdown so visitors can preview the other color_scheme presets client-side (choice persists in their browser via localStorage, doesn't change your site's actual config). Off by default — most sites want one consistent brand color; useful for a theme showcase/demo site."
  show_search:
    type: toggle
    label: "Show search box in sidebar"
    default: true
  flat_nav:
    type: toggle
    label: "Flatten sidebar navigation"
    default: false
    help: "By default the sidebar shows the full nested page tree (click a section to expand it). Turn this on to show only top-level pages, matching caravan's original flat nav."
  nav_expand:
    type: select
    label: "Sidebar section expansion"
    options: [auto, click]
    default: auto
    help: "\"auto\" (default) shows no chevron — a section is only ever open because the current page is inside it. \"click\" adds a chevron on each section so visitors can also expand/collapse it manually. Ignored when flat_nav is on (no sections to expand)."
  footer_text:
    type: text
    label: "Footer text"
    default: ""
