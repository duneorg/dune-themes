name: arcana
version: 1.0.0
description: "Arcana — corporate landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-arcana
attribution: "HTML5 UP Arcana (CC BY 3.0) — https://html5up.net/arcana"
config_schema:
  tagline:
    type: text
    label: Logo tagline (empty = site description)
    default: ""
  banner_title:
    type: text
    label: Banner headline (empty = site title)
    default: ""
  show_banner:
    type: toggle
    label: Show hero banner on home page
    default: true
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
