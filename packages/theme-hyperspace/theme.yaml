name: hyperspace
version: 1.0.0
description: "Hyperspace — sidebar landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-hyperspace
attribution: "HTML5 UP Hyperspace (CC BY 3.0) — https://html5up.net/hyperspace"
config_schema:
  show_intro:
    type: toggle
    label: Show full-screen intro on home page
    default: true
  intro_title:
    type: text
    label: Intro headline (empty = site title)
    default: ""
  intro_subtitle:
    type: text
    label: Intro subtitle
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
