name: hyperspace
version: 1.0.0
description: "Hyperspace — responsive site theme adapted from HTML5 UP for Dune. Sidebar landing."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-hyperspace
attribution: "HTML5 UP Hyperspace by HTML5 UP (CC BY 3.0) — https://html5up.net/license"
config_schema:
  accent_color:
    type: color
    label: Accent colour
    default: "#5b6ba4"
  default_dark:
    type: toggle
    label: Default to dark mode
    default: false
  footer_text:
    type: text
    label: Footer text (leave empty for default)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit in footer
    default: true
  home_subtitle:
    type: text
    label: Home page subtitle
    default: ""
