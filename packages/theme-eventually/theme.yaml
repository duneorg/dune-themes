name: eventually
version: 1.0.0
description: "Eventually — coming-soon landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-eventually
attribution: "HTML5 UP Eventually (CC BY 3.0) — https://html5up.net/eventually"
config_schema:
  tagline:
    type: text
    label: Hero tagline (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
