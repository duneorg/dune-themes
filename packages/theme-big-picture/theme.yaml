name: big-picture
version: 1.0.0
description: "Big Picture — scroll-driven gallery landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-big-picture
attribution: "HTML5 UP Big Picture (CC BY 3.0) — https://html5up.net/big-picture"
config_schema:
  tagline:
    type: text
    label: Intro tagline (empty = site description)
    default: ""
  banner_title:
    type: text
    label: Intro headline (empty = Hey.)
    default: ""
  show_banner:
    type: toggle
    label: Show intro fullscreen section on home
    default: true
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
