name: escape-velocity
version: 1.0.0
description: "Escape Velocity — marketing landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-escape-velocity
attribution: "HTML5 UP Escape Velocity (CC BY 3.0) — https://html5up.net/escape-velocity"
config_schema:
  tagline:
    type: text
    label: Logo tagline (empty = site description)
    default: ""
  intro_title:
    type: text
    label: Homepage intro section title
    default: "The Introduction"
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
