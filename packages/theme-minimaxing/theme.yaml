name: minimaxing
version: 1.0.0
description: "Minimaxing — responsive business landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-minimaxing
attribution: "HTML5 UP Minimaxing (CC BY 3.0) — https://html5up.net/minimaxing"
config_schema:
  tagline:
    type: text
    label: Banner subtitle (empty = site description)
    default: ""
  banner_title:
    type: text
    label: Banner headline
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
