name: editorial
version: 1.0.0
description: "Editorial — magazine layout with sidebar, adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-editorial
attribution: "HTML5 UP Editorial (CC BY 3.0) — https://html5up.net/editorial"
config_schema:
  logo_suffix:
    type: text
    label: Logo suffix after site title (e.g. "by HTML5 UP")
    default: ""
  sidebar_blurb:
    type: text
    label: Sidebar about blurb (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
