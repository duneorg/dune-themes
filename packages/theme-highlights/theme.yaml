name: highlights
version: 1.0.0
description: "Highlights — responsive single-page landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-highlights
attribution: "HTML5 UP Highlights (CC BY 3.0) — https://html5up.net/highlights"
config_schema:
  tagline:
    type: text
    label: Hero tagline (empty = default)
    default: ""
  banner_title:
    type: text
    label: Hero headline (empty = site title)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
