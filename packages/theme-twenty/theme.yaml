name: twenty
version: 1.0.0
description: "Twenty — multipurpose landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-twenty
attribution: "HTML5 UP Twenty (CC BY 3.0) — https://html5up.net/twenty"
config_schema:
  banner_title:
    type: text
    label: Banner headline (empty = site title uppercase)
    default: ""
  tagline:
    type: text
    label: Logo tagline after site title
    default: "by HTML5 UP"
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
