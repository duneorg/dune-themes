name: astral
version: 1.0.0
description: "Astral — icon-nav portfolio theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-astral
attribution: "HTML5 UP Astral (CC BY 3.0) — https://html5up.net/astral"
config_schema:
  avatar:
    type: text
    label: Intro portrait URL (empty = theme default)
    default: ""
  home_subtitle:
    type: text
    label: Home subtitle (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
