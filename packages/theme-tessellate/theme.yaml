name: tessellate
version: 1.0.0
description: "Tessellate — grid landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-tessellate
attribution: "HTML5 UP Tessellate (CC BY 3.0) — https://html5up.net/tessellate"
config_schema:
  hero_title:
    type: text
    label: Hero headline (empty = Welcome to site title)
    default: ""
  hero_subtitle:
    type: text
    label: Hero subtitle (empty = site description)
    default: ""
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
