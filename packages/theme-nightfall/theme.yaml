name: nightfall
description: "Nightfall — a dark-first documentation theme with sidebar and on-page TOC, inspired by Astro Starlight"
author: "Dune Theme Library (design inspired by Starlight by the Astro team)"
version: "0.1.0"
config_schema:
  accent_color:
    type: color
    label: "Accent colour"
    default: "#3b82f6"
  default_dark:
    type: toggle
    label: "Default to dark mode"
    default: true
  github_url:
    type: text
    label: "GitHub URL (header icon)"
    default: ""
  tagline:
    type: text
    label: "Hero tagline (splash template)"
    default: ""
