name: directive
version: 1.0.0
description: "Directive — responsive landing theme adapted from HTML5 UP for Dune."
author: Dune Themes
license: MIT
source: https://github.com/duneorg/dune-themes/tree/main/packages/theme-directive
attribution: "HTML5 UP Directive (CC BY 3.0) — https://html5up.net/directive"
config_schema:
  tagline:
    type: text
    label: Hero tagline (empty = site description)
    default: ""
  banner_title:
    type: text
    label: Hero headline (empty = Hi. This is {site title}.)
    default: ""
  show_banner:
    type: toggle
    label: Show hero header on home
    default: true
  show_html5up_credit:
    type: toggle
    label: Show HTML5 UP design credit
    default: true
  footer_text:
    type: text
    label: Copyright name (empty = site title)
    default: ""
